server {
    listen 80;
    server_name security.neohost.md;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name security.neohost.md;

    ssl_certificate     /etc/letsencrypt/live/security.neohost.md/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/security.neohost.md/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Fișiere statice frontend (build React)
    root /opt/neohost-security/frontend/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API -> backend Flask
    location /api/ {
        proxy_pass         http://127.0.0.1:7654;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # WebSocket -> backend Flask
    location /ws {
        proxy_pass          http://127.0.0.1:7654;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Restricție suplimentară: permite doar IP-urile tale
    # allow 95.65.0.103;
    # allow 95.65.0.108;
    # deny all;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
}
